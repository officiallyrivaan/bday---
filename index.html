<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>don't click this</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  /* ---- PHASE 1 ---- */
  #phase1 {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transition: opacity 0.4s;
  }
  #phase1 p {
    color: #555;
    font-size: clamp(11px, 3vw, 14px);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #mystery-btn {
    padding: clamp(16px, 4vw, 22px) clamp(32px, 8vw, 60px);
    font-size: clamp(14px, 4vw, 18px);
    font-family: 'Courier New', monospace;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: transparent;
    color: #fff;
    border: 2px solid #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }
  #mystery-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: #fff;
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
    z-index: 0;
  }
  #mystery-btn:hover::before { transform: scaleX(1); }
  #mystery-btn:hover { color: #0a0a0a; }
  #mystery-btn span { position: relative; z-index: 1; }

  /* ---- PHASE 2: BDAY ---- */
  #phase2 {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .bday-text {
    font-family: 'Georgia', serif;
    font-size: clamp(38px, 11vw, 100px);
    font-weight: 900;
    line-height: 1.05;
    color: #fff;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .bday-text.name {
    color: #FFD700;
    font-size: clamp(48px, 14vw, 130px);
  }
  .bday-text.emoji { font-size: clamp(48px, 12vw, 110px); }
  .bday-text.show { opacity: 1; transform: scale(1); }
  .sub-line {
    margin-top: 18px;
    font-size: clamp(12px, 3vw, 16px);
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.4s 0.6s;
  }
  .sub-line.show { opacity: 1; }

  /* confetti */
  .confetti-piece {
    position: fixed;
    top: -20px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* candle flicker */
  @keyframes flicker {
    0%, 100% { text-shadow: 0 0 12px #FFD700, 0 0 30px #FF8C00; }
    50%       { text-shadow: 0 0 6px #FFD700, 0 0 16px #FF4500; }
  }
  .flicker { animation: flicker 0.9s ease-in-out infinite; }

  /* ---- PHASE 3: face zoom ---- */
  #phase3 {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    overflow: hidden;
  }

  #face {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    /* zoom animation kicks in via JS */
  }

  @keyframes face-zoom {
    0%   { width: 120px; height: 120px; border-radius: 12px; }
    100% { width: 300vmax; height: 300vmax; border-radius: 0px; }
  }

  #face.zooming {
    animation: face-zoom 2.5s cubic-bezier(0.4, 0, 0.6, 1) forwards;
  }

  #face-caption {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: clamp(13px, 4vw, 20px);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0;
    text-align: center;
    white-space: nowrap;
    z-index: 10;
    transition: opacity 0.4s;
    text-shadow: 0 2px 8px #000;
  }
</style>
</head>
<body>

<!-- PHASE 1 -->
<div id="phase1">
  <p>hmm what could this be...</p>
  <button id="mystery-btn" onclick="reveal()">
    <span>click me</span>
  </button>
</div>

<!-- PHASE 2 -->
<div id="phase2">
  <div class="bday-text emoji flicker" id="e1">🎂</div>
  <div class="bday-text" id="t1">HAPPY BIRTHDAY</div>
  <div class="bday-text name" id="t2">STEPHEN!!!</div>
  <div class="sub-line" id="sub">but wait... 👀</div>
</div>

</div>

<script>
  function reveal() {
    const p1 = document.getElementById('phase1');
    p1.style.opacity = '0';

    setTimeout(() => {
      p1.style.display = 'none';
      const p2 = document.getElementById('phase2');
      p2.style.display = 'flex';

      launchConfetti();

      setTimeout(() => document.getElementById('e1').classList.add('show'), 50);
      setTimeout(() => document.getElementById('t1').classList.add('show'), 350);
      setTimeout(() => document.getElementById('t2').classList.add('show'), 650);
      setTimeout(() => document.getElementById('sub').classList.add('show'), 1100);

      setTimeout(() => {
        p2.style.opacity = '0';
        p2.style.transition = 'opacity 0.4s';
        setTimeout(() => {
          p2.style.display = 'none';
          startFaceZoom();
        }, 400);
      }, 2800);
    }, 400);
  }

  function startFaceZoom() {
    const p3 = document.getElementById('phase3');
    p3.style.display = 'flex';

    const face = document.getElementById('face');
    const caption = document.getElementById('face-caption');

    // fade face in small
    requestAnimationFrame(() => {
      face.style.opacity = '1';

      // after it's visible for a beat, start zooming
      setTimeout(() => {
        caption.style.opacity = '1';
        face.classList.add('zooming');

        // after zoom completes, show caption
        setTimeout(() => {
          caption.textContent = '💀 HAPPY BIRTHDAY STEPHEN 💀';
          launchConfetti();
        }, 2500);
      }, 600);
    });
  }

  function launchConfetti() {
    const colors = ['#FFD700','#FF6B6B','#48CAE4','#B5EAD7','#FF9F1C','#fff','#f72585'];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.width = (8 + Math.random() * 8) + 'px';
        c.style.height = (8 + Math.random() * 8) + 'px';
        c.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }, Math.random() * 1200);
    }
  }
</script>
